site_name: OmniMirror Documentation
site_description: Documentation for OmniMirror, a Blender add-on for persistent symmetry workflows.
site_url: https://mykytapetrenko.github.io/OmniMirror-Docs/
repo_url: https://github.com/MykytaPetrenko/OmniMirror-Docs
repo_name: MykytaPetrenko/OmniMirror-Docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: blue
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - About: about.md
  - Workflow: workflow.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

